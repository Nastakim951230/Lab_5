# Имя пайплайна (отображается на GitHub)
name: CI/CD Pipeline

# Когда запускать:
# - При пуше в main
# - При создании Pull Request в main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Список задач (jobs)
jobs:
  
  # ЗАДАЧА 1: Тестирование
  test:
    name: 🧪 Тестирование
    runs-on: ubuntu-latest  # Используем Ubuntu (бесплатно)
    
    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v3
      
      - name: ⚙️ Установка Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📦 Установка зависимостей
        run: npm ci  # Устанавливает ТОЧНО те же версии, что в package-lock.json
      
      - name: 🧪 Запуск тестов
        run: npm test
        # Если тесты упадут - задача завершится с ошибкой

  # ЗАДАЧА 2: Сборка
  build:
    name: 🏗️ Сборка
    runs-on: ubuntu-latest
    needs: test  # Запускается ТОЛЬКО после успешных тестов
    
    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v3
      
      - name: ⚙️ Установка Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📦 Установка зависимостей
        run: npm ci
      
      - name: 🏗️ Сборка проекта
        run: npm run build
      
      - name: 📂 Сохранение артефактов
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: src/

  # ЗАДАЧА 3: Деплой
  deploy:
    name: 🚀 Деплой
    runs-on: ubuntu-latest
    needs: [test, build]  # Запускается после test И build
    # Только при пуше в main (не при PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v3
      
      - name: ⚙️ Установка Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📦 Установка зависимостей
        run: npm ci
      
      - name: 🚀 Деплой на GitHub Pages
        run: |
          git remote set-url origin https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: ✅ Статус деплоя
        run: echo "✅ Деплой выполнен! Сайт: https://${{ github.repository_owner }}.github.io/${{ github.repository_name }}/"